<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountability Engine // Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #08080a;
            --panel: #121217;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.1);
            --danger: #ff4655;
            --text: #e2e2e9;
            --text-dim: #767685;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Tactical Sidebar */
        .sidebar {
            width: 340px;
            background: #0c0c0f;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 20px 0 10px 0;
        }

        .config-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        input, select {
            width: 100%;
            background: #08080a;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 13px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 12px;
        }

        .btn:hover { background: #00cc6d; transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: white; margin-top: 5px; }
        .btn-danger:hover { background: #e03e4b; }

        .profile-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Hierarchy Directory Tree Elements */
        .folder-block {
            margin-bottom: 12px;
            border-left: 1px dashed rgba(255, 255, 255, 0.1);
            padding-left: 8px;
        }

        .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-weight: 700;
            font-size: 13px;
            color: #f4b400;
            margin-bottom: 6px;
        }

        .profile-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: 0.15s;
            text-align: left;
            width: 100%;
            font-family: inherit;
            color: inherit;
        }

        .profile-item:hover, .profile-item.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .item-text-group {
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .item-label-meta {
            color: var(--text-dim); 
            font-size: 9px; 
            text-transform: uppercase;
            margin-top: 2px;
        }

        .scrub-action {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            padding: 0 4px;
            transition: color 0.1s;
        }
        .scrub-action:hover { color: var(--danger); }

        /* Main Command Deck */
        .workspace {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .view-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .view-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            margin: 0;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            background: var(--accent-dim);
            color: var(--accent);
            margin-top: 10px;
        }

        /* Task Question Cards */
        .task-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.2s;
            user-select: none;
        }

        .task-card.failed {
            border-color: var(--danger);
            background: rgba(255, 70, 85, 0.05);
        }

        .check-box {
            width: 28px;
            height: 28px;
            border: 2px solid var(--accent);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-sizing: border-box;
        }

        .task-card.failed .check-box {
            border-color: var(--danger);
        }

        .check-box.checked { background: var(--accent); }
        .check-box.checked::after { content: '✓'; color: black; font-weight: bold; }

        .task-info { flex: 1; }
        .task-name { font-size: 18px; font-weight: 600; }
        .task-meta { font-size: 12px; color: var(--text-dim); }

        /* Graphing Panel */
        .analytics-box {
            margin-top: 40px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        canvas { max-height: 300px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1 style="font-family:'Orbitron'; font-size: 18px; color: var(--accent); margin: 0;">ENGINE.EXE</h1>
    
    <h2>Mount Directory Folder</h2>
    <div class="config-box">
        <input type="text" id="folder-name" placeholder="Folder Name (e.g., Gaming Tech)">
        <button class="btn" onclick="addFolderNode()">Create Folder</button>
    </div>

    <h2>Mount New Profile</h2>
    <div class="config-box">
        <input type="text" id="prof-name" placeholder="Profile Name (e.g. Grinding)">
        <select id="prof-folder-select">
            <option value="unassigned">-- No Folder (Root) --</option>
        </select>
        <select id="prof-type" onchange="toggleInterval()">
            <option value="cyclical">Daily/Cyclical Reset</option>
            <option value="never">Permanent Goal (No Reset)</option>
        </select>
        <input type="number" id="prof-int" value="1" placeholder="Days per cycle">
        <button class="btn" onclick="addProfile()">Initialize Profile</button>
    </div>

    <h2>Active Hierarchy</h2>
    <div id="sidebar-list" class="profile-list"></div>
</div>

<div class="workspace">
    <div class="view-header">
        <h1 id="active-title">Awaiting Initialization</h1>
        <div id="active-meta" class="status-badge">System Offline</div>
    </div>

    <div id="task-container"></div>

    <div id="creator-tool" style="display:none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
        <div style="display:flex; gap: 10px;">
            <input type="text" id="new-task-name" placeholder="Define critical path task..." style="flex:1; margin-bottom:0;">
            <button class="btn" style="width: auto;" onclick="addTask()">+ Add Node</button>
        </div>
    </div>

    <div class="analytics-box">
        <h2 style="margin-top:0;">consistency.log // Productivity Data</h2>
        <div style="position: relative; height:300px; width:100%;">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    let rawState = localStorage.getItem('acc_engine_state_v3');
    let state;

    // Namespace hydration mapping check setup
    try {
        let parsed = JSON.parse(rawState);
        if (parsed && parsed.profiles && parsed.logs && parsed.folders) {
            state = parsed;
        } else {
            throw new Error();
        }
    } catch(e) {
        state = { folders: {}, profiles: {}, logs: {} };
        localStorage.setItem('acc_engine_state_v3', JSON.stringify(state));
    }

    let activeProfileId = null;
    let chart = null;

    function save() {
        localStorage.setItem('acc_engine_state_v3', JSON.stringify(state));
    }

    function toggleInterval() {
        const type = document.getElementById('prof-type').value;
        document.getElementById('prof-int').style.display = type === 'never' ? 'none' : 'block';
    }

    function addFolderNode() {
        const name = document.getElementById('folder-name').value.trim();
        if (!name) return alert("Please enter a valid folder name.");
        const id = 'f_' + Date.now();
        state.folders[id] = { id, name };
        save();
        renderSidebar();
        document.getElementById('folder-name').value = '';
    }

    function deleteFolderNode(id, event) {
        event.stopPropagation();
        if (!confirm("Delete this folder? Profiles inside will be unassigned to Root space layout.")) return;
        
        // Re-assign orphaned child components back to unassigned space layout safely
        Object.keys(state.profiles).forEach(pId => {
            if (state.profiles[pId].folderId === id) {
                state.profiles[pId].folderId = 'unassigned';
            }
        });
        
        delete state.folders[id];
        save();
        renderSidebar();
    }

    function addProfile() {
        const name = document.getElementById('prof-name').value.trim();
        if (!name) return alert("Please enter a valid profile name.");
        const id = 'p_' + Date.now();
        
        state.profiles[id] = {
            id,
            name,
            folderId: document.getElementById('prof-folder-select').value,
            type: document.getElementById('prof-type').value,
            interval: parseInt(document.getElementById('prof-int').value) || 1,
            tasks: []
        };
        
        save();
        renderSidebar();
        selectProfile(id);
        document.getElementById('prof-name').value = '';
    }

    function deleteProfileNode(id, event) {
        event.stopPropagation();
        if (!confirm(`Completely scrub profile details and historical tracking indexes?`)) return;
        
        delete state.profiles[id];
        if (activeProfileId === id) {
            activeProfileId = null;
            document.getElementById('creator-tool').style.display = 'none';
            document.getElementById('task-container').innerHTML = '';
            document.getElementById('active-title').innerText = 'Awaiting Initialization';
            document.getElementById('active-meta').innerText = 'System Offline';
            if (chart) chart.destroy();
        }
        
        save();
        renderSidebar();
    }

    function addTask() {
        const name = document.getElementById('new-task-name').value.trim();
        if (!name || !activeProfileId) return;
        state.profiles[activeProfileId].tasks.push({
            id: 't_' + Date.now(),
            name
        });
        document.getElementById('new-task-name').value = '';
        save();
        renderTasks();
        updateChart();
    }

    function getCycleId(profileId) {
        const p = state.profiles[profileId];
        if (p.type === 'never') return 'epoch';
        
        const now = new Date();
        const adjusted = new Date(now.getTime() - (3 * 60 * 60 * 1000));
        const daysSinceEpoch = Math.floor(adjusted.getTime() / (1000 * 60 * 60 * 24));
        return `cycle_${Math.floor(daysSinceEpoch / p.interval)}`;
    }

    function toggleTask(taskId) {
        const cycle = getCycleId(activeProfileId);
        if (!state.logs[cycle]) state.logs[cycle] = {};
        if (!state.logs[cycle][activeProfileId]) state.logs[cycle][activeProfileId] = {};
        
        const current = state.logs[cycle][activeProfileId][taskId] !== false; 
        state.logs[cycle][activeProfileId][taskId] = !current;
        
        save();
        renderTasks();
        updateChart();
    }

    function selectProfile(id) {
        activeProfileId = id;
        document.getElementById('creator-tool').style.display = 'block';
        renderSidebar();
        renderTasks();
        updateChart();
    }

    function renderSidebar() {
        const list = document.getElementById('sidebar-list');
        const select = document.getElementById('prof-folder-select');
        
        list.innerHTML = '';
        // Re-hydrate folder mounting dropdown field array tracking parameters
        select.innerHTML = '<option value="unassigned">-- No Folder (Root) --</option>';
        
        // Render folder block groupings
        Object.keys(state.folders).forEach(fId => {
            const f = state.folders[fId];
            
            // Populate selector option maps
            const opt = document.createElement('option');
            opt.value = fId;
            opt.textContent = f.name;
            select.appendChild(opt);

            // Generate structural container nodes
            const block = document.createElement('div');
            block.className = 'folder-block';
            block.innerHTML = `
                <div class="folder-header">
                    <span>📁 ${f.name}</span>
                    <button class="scrub-action" onclick="deleteFolderNode('${fId}', event)">✕</button>
                </div>
                <div id="container-${fId}"></div>
            `;
            list.appendChild(block);
        });

        // Track unassigned configurations targeted to Root framework layers
        const rootContainer = document.createElement('div');
        rootContainer.id = 'container-unassigned';
        list.appendChild(rootContainer);

        // Sort profiles inside their mapped layout structural designations
        Object.keys(state.profiles).forEach(id => {
            const p = state.profiles[id];
            const targetContainerId = p.folderId && state.folders[p.folderId] ? p.folderId : 'unassigned';
            const targetEl = document.getElementById(`container-${targetContainerId}`);
            
            if (targetEl) {
                const btn = document.createElement('button');
                btn.className = `profile-item ${id === activeProfileId ? 'active' : ''}`;
                btn.onclick = () => selectProfile(id);
                btn.innerHTML = `
                    <div class="item-text-group">
                        <span>📄 ${p.name}</span>
                        <span class="item-label-meta">${p.type}</span>
                    </div>
                    <button class="scrub-action" onclick="deleteProfileNode('${id}', event)">✕</button>
                `;
                targetEl.appendChild(btn);
            }
        });
    }

    function renderTasks() {
        const p = state.profiles[activeProfileId];
        if (!p) return;
        const container = document.getElementById('task-container');
        document.getElementById('active-title').innerText = p.name;
        document.getElementById('active-meta').innerText = `Persistence Strategy: ${p.type.toUpperCase()}`;
        
        container.innerHTML = '';
        const cycle = getCycleId(activeProfileId);

        p.tasks.forEach(t => {
            const isPassed = state.logs[cycle]?.[activeProfileId]?.[t.id] !== false;
            const card = document.createElement('div');
            card.className = `task-card ${isPassed ? '' : 'failed'}`;
            card.innerHTML = `
                <div class="check-box ${isPassed ? 'checked' : ''}" onclick="toggleTask('${t.id}')"></div>
                <div class="task-info">
                    <div class="task-name">${t.name}</div>
                    <div class="task-meta">${isPassed ? 'Goal Maintained' : 'GOAL FAILED - ACCOUNTABILITY LOGGED'}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function updateChart() {
        const canvas = document.getElementById('mainChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (chart) chart.destroy();

        const p = state.profiles[activeProfileId];
        if (!p || p.tasks.length === 0) return;

        const labels = [];
        const data = [];
        
        for (let i = 6; i >= 0; i--) {
            const now = new Date();
            const offset = i * (p.type === 'never' ? 0 : p.interval);
            const adj = new Date(now.getTime() - (offset * 24 * 60 * 60 * 1000) - (3 * 60 * 60 * 1000));
            const daysSince = Math.floor(adj.getTime() / (1000 * 60 * 60 * 24));
            const cId = p.type === 'never' ? 'epoch' : `cycle_${Math.floor(daysSince / p.interval)}`;
            
            labels.push(p.type === 'never' ? 'Current State' : `Cycle -${i}`);
            
            let passedCount = 0;
            p.tasks.forEach(t => {
                if (state.logs[cId]?.[activeProfileId]?.[t.id] !== false) passedCount++;
            });
            data.push((passedCount / p.tasks.length) * 100);
        }

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Execution Alignment %',
                    data,
                    borderColor: '#00ff88',
                    backgroundColor: 'rgba(0, 255, 136, 0.05)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.2,
                    pointBackgroundColor: '#00ff88'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        min: 0, 
                        max: 100, 
                        grid: { color: 'rgba(255,255,255,0.04)' }, 
                        ticks: { color: '#767685', font: { family: 'Space Grotesk' } } 
                    },
                    x: { 
                        grid: { display: false }, 
                        ticks: { color: '#767685', font: { family: 'Space Grotesk' } } 
                    }
                },
                plugins: { 
                    legend: { display: false }
                }
            }
        });
    }

    renderSidebar();
    const keys = Object.keys(state.profiles);
    if (keys.length > 0) {
        selectProfile(keys[0]);
    }
</script>
</body>
</html>
