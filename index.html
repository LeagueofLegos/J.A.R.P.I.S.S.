<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quest Log // Interrogation Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --panel: #0d0d12;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.08);
            --danger: #ff4655;
            --danger-dim: rgba(255, 70, 85, 0.1);
            --text: #e2e2e9;
            --text-dim: #6d6d7e;
            --terminal-user: #3b82f6;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: #09090c;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            justify-content: space-between;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 20px 0 10px 0;
        }

        .config-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 100%;
            background: #040405;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 13px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea { height: 120px; resize: none; color: var(--accent); font-family: monospace; }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 12px;
            text-align: center;
        }
        .btn:hover { background: #00dd76; transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #e03b48; }
        .btn-secondary { background: #1a1a24; color: white; border: 1px solid var(--border); }
        .btn-secondary:hover { background: #252533; }

        .quest-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .quest-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 6px;
            text-align: left;
            width: 100%;
            font-family: inherit;
            color: inherit;
            cursor: pointer;
        }
        .quest-item:hover, .quest-item.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .scrub-action { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; font-weight: bold; }
        .scrub-action:hover { color: var(--danger); }

        .workspace {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            background: radial-gradient(circle at 90% 10%, rgba(0, 255, 136, 0.02), transparent);
        }

        .view-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .view-header h1 { font-family: 'Orbitron', sans-serif; font-size: 24px; margin: 0; letter-spacing: 1px; }

        .terminal-container {
            flex: 1;
            background: #040406;
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .terminal-feed {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .msg { display: flex; flex-direction: column; max-width: 85%; }
        .msg.sys { align-self: flex-start; color: var(--accent); }
        .msg.user { align-self: flex-end; color: #69a1ff; text-align: right; }
        
        .msg-sender { font-size: 10px; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; color: var(--text-dim); }
        .msg.sys .msg-sender { color: var(--accent); }
        .msg.user .msg-sender { color: var(--terminal-user); }

        .msg-text { background: rgba(255, 255, 255, 0.02); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); white-space: pre-wrap; }
        .msg.sys .msg-text { background: var(--accent-dim); border-color: rgba(0, 255, 136, 0.15); }
        .msg.user .msg-text { background: rgba(59, 130, 246, 0.08); border-color: rgba(59, 130, 246, 0.15); }

        .terminal-input-bar {
            display: flex;
            border-top: 1px solid var(--border);
            background: #09090c;
            padding: 12px;
            gap: 12px;
            align-items: center;
        }
        .terminal-input-bar input { margin-bottom: 0; font-family: monospace; }
        .terminal-input-bar ::placeholder { color: #4b4b5a; }

        .export-drawer {
            margin-top: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div>
        <h1 style="font-family:'Orbitron'; font-size: 20px; color: var(--accent); margin: 0; letter-spacing: 1px;">QUEST_LOG.EXE</h1>
        
        <h2>Append Action Targets</h2>
        <div class="config-box">
            <input type="text" id="quest-input" placeholder="Goal/Task Objective...">
            <button class="btn" onclick="addQuestNode()">Register Objective</button>
        </div>

        <h2>Active Objectives Matrix</h2>
        <div id="quest-list-container" class="quest-list"></div>
    </div>

    <div>
        <button class="btn btn-danger" onclick="triggerGlobalReset()">⚠️ Global Reset Epoch</button>
    </div>
</div>

<div class="workspace">
    <div class="view-header">
        <div>
            <h1 id="terminal-header">Socratic Disruptor Console</h1>
            <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; letter-spacing: 1px;">Status: Operational // Interactive Bypass Loop</div>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal-feed" class="terminal-feed"></div>
        <div class="terminal-input-bar">
            <span style="color: var(--accent); font-family: monospace; font-weight: bold; padding-left: 8px;">&gt;</span>
            <input type="text" id="terminal-input" placeholder="Type here to respond to the system query..." autocomplete="off">
            <button class="btn" style="width: auto; padding: 0 24px; height: 42px;" onclick="handleUserSubmit()">Send</button>
        </div>
    </div>

    <div class="export-drawer">
        <h2 style="margin-top: 0;">AI Payload Transmission Stream</h2>
        <div style="display: flex; gap: 12px; margin-bottom: 10px;">
            <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 11px;" onclick="assembleAiPayload()">Generate Telemetry Package</button>
            <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 11px;" onclick="copyPayloadText()">Copy Stream</button>
        </div>
        <textarea id="export-box" readonly placeholder="Analytical JSON dialogue data logs will render here..."></textarea>
    </div>
</div>

<script>
    // System Socratic Prompting Question Array
    const socraticQuestions = [
        "What precisely is the absolute worst consequence if you decide not to touch this assignment right now?",
        "Are you waiting to achieve a feeling of 'readiness' before acting? Where does that specific sensation manifest?",
        "If an automated script forced you to do exactly 120 seconds of this work right now, what would break?",
        "Look at your target goal. Is your current hesitation rooted in an unrecognized fear of failure, or a hidden fear of scale?",
        "Describe the friction point keeping you in place. Is it mechanical lack of data, or an emotional energy blockade?",
        "What happens to your long-term consistency run if today's window closes completely flat?"
    ];

    let state;
    const STORAGE_KEY = 'daily_quest_log_state_v5';

    function initSystemState() {
        let raw = localStorage.getItem(STORAGE_KEY);
        try {
            state = JSON.parse(raw);
            if (!state || !state.quests || !state.dialogHistory) throw new Error();
        } catch (e) {
            state = {
                quests: [],
                dialogHistory: [
                    { sender: 'sys', text: "SYSTEM INITIALIZED. Hello. Type 'hi' or greet the platform to awaken the disruption loop sequence." }
                ],
                questionIndex: 0
            };
            save();
        }
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function renderQuests() {
        const container = document.getElementById('quest-list-container');
        container.innerHTML = '';
        
        if (state.quests.length === 0) {
            container.innerHTML = `<div style="color:var(--text-dim); font-size:12px; font-style:italic; padding:10px;">Matrix Empty. Load objectives to track.</div>`;
            return;
        }

        state.quests.forEach((q, idx) => {
            const el = document.createElement('div');
            el.className = `quest-item`;
            el.innerHTML = `
                <span style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80%;">🎯 ${q.name}</span>
                <button class="scrub-action" onclick="deleteQuestNode(${idx}, event)">✕</button>
            `;
            container.appendChild(el);
        });
    }

    function addQuestNode() {
        const input = document.getElementById('quest-input');
        const name = input.value.trim();
        if (!name) return;

        state.quests.push({ name, timestamp: new Date().toISOString() });
        input.value = '';
        save();
        renderQuests();
    }

    function deleteQuestNode(idx, e) {
        e.stopPropagation();
        state.quests.splice(idx, 1);
        save();
        renderQuests();
    }

    function renderTerminalFeed() {
        const feed = document.getElementById('terminal-feed');
        feed.innerHTML = '';

        state.dialogHistory.forEach(msg => {
            const card = document.createElement('div');
            card.className = `msg ${msg.sender}`;
            card.innerHTML = `
                <span class="msg-sender">${msg.sender === 'sys' ? 'SYS_DISRUPTOR' : 'USER_TARGET'}</span>
                <div class="msg-text">${msg.text}</div>
            `;
            feed.appendChild(card);
        });

        feed.scrollTop = feed.scrollHeight;
    }

    function appendDialog(sender, text) {
        state.dialogHistory.push({ sender, text });
        save();
        renderTerminalFeed();
    }

    function handleUserSubmit() {
        const input = document.getElementById('terminal-input');
        const text = input.value.trim();
        if (!text) return;

        appendDialog('user', text);
        input.value = '';

        // Core Dialogue Logic Controller
        setTimeout(() => {
            const testClean = text.toLowerCase();
            if (testClean === 'hi' || testClean === 'hello' || testClean === 'hey') {
                if (state.quests.length === 0) {
                    appendDialog('sys', "Greetings. The system registers no active objectives in your sidebar layout matrix. Mount a target goal so we can interrogate your strategy architecture.");
                } else {
                    state.questionIndex = 0;
                    appendDialog('sys', `Acknowledged. Let's inspect your focus framework.\n\nTarget Metric: "${state.quests[0].name}"\n\nInterrogation Route Step 1:\n${socraticQuestions[0]}`);
                }
            } else {
                // Advance Socratic Interrogation Loop
                if (state.quests.length === 0) {
                    appendDialog('sys', "System requires a contextual tracking anchor. Please log an target objective inside the workspace matrix configuration sidebar.");
                } else {
                    state.questionIndex = (state.questionIndex + 1) % socraticQuestions.length;
                    const nextQuestion = socraticQuestions[state.questionIndex];
                    appendDialog('sys', `Data parsed. Redirecting mind focus vector logic patterns...\n\nNext Interrogation Directive:\n${nextQuestion}`);
                }
            }
        }, 400);
    }

    function triggerGlobalReset() {
        const confirmation = confirm("⚠️ ERASE ACTIVE RUN TIMELINE EPOCH ⚠️\n\nThis permanently purges active profiles, tracking registries, and conversational histories. Your raw parameters will clear out fully.");
        if (!confirmation) return;

        state = {
            quests: [],
            dialogHistory: [
                { sender: 'sys', text: "SYSTEM REBOOT COMPLETE. Memory modules initialized to ground state. Welcome to your fresh timeline. Say 'hi' to prompt the disruptor engine." }
            ],
            questionIndex: 0
        };
        save();
        renderQuests();
        renderTerminalFeed();
        document.getElementById('export-box').value = '';
    }

    function assembleAiPayload() {
        const payload = {
            exportTimestamp: new Date().toISOString(),
            registeredObjectives: state.quests,
            socraticDialogueLog: state.dialogHistory
        };
        document.getElementById('export-box').value = JSON.stringify(payload, null, 2);
    }

    function copyPayloadText() {
        const box = document.getElementById('export-box');
        if (!box.value) return;
        box.select();
        try {
            navigator.clipboard.writeText(box.value);
        } catch (err) {}
    }

    // Modern Terminal Command Shortcut Mapping Setup
    window.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.activeElement === document.getElementById('terminal-input')) {
            handleUserSubmit();
        }
    });

    // Boot Initialization Call Routine
    initSystemState();
    renderQuests();
    renderTerminalFeed();
</script>
</body>
</html>
